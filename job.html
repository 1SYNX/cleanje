<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleanje | Job</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="page">
    <header class="app-header card">
      <div>
        <p class="badge">Cleanje Booking System</p>
        <h1>Job Sheet</h1>
      </div>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="index.html">Booking</a>
        <a class="active" href="job.html">Job</a>
        <a href="payment.html">Payment</a>
      </nav>
    </header>

    <section class="card">
      <form id="jobForm" class="form-grid">
        <label class="full-width">
          Select Existing Booking
          <select id="jobBookingSelector">
            <option value="">Select booking ID...</option>
          </select>
        </label>

        <label>
          Booking ID
          <input id="jobBookingId" required />
        </label>

        <label>
          Setmore ID
          <input id="jobSetmoreId" />
        </label>

        <label>
          Service ID Category
          <select id="jobServiceCategory" required>
            <option value="CVX1">CVX1</option>
            <option value="CVX2">CVX2</option>
            <option value="CVX4">CVX4</option>
            <option value="CVX6">CVX6</option>
          </select>
        </label>

        <label>
          Date
          <input id="jobDate" type="date" required />
        </label>

        <label>
          Month
          <input id="jobMonth" readonly />
        </label>

        <label>
          Year
          <input id="jobYear" readonly />
        </label>

        <label>
          Vehicle Plat
          <input id="jobVehiclePlat" />
        </label>

        <label>
          Customer Name
          <input id="jobCustomerName" required />
        </label>

        <label>
          Toll [RM]
          <input id="jobToll" type="number" min="0" step="0.01" value="0" />
        </label>

        <label>
          Mileage [KM]
          <input id="jobMileage" type="number" min="0" step="0.1" value="0" />
        </label>

        <label>
          Start Time
          <input id="jobStartTime" type="time" />
        </label>

        <label>
          End Time
          <input id="jobEndTime" type="time" />
        </label>

        <label>
          Duration (hrs)
          <input id="jobDuration" type="number" min="0" step="0.01" readonly />
        </label>

        <label>
          On-Site Condition
          <textarea id="jobOnSiteCondition" rows="2"></textarea>
        </label>

        <label>
          Dry Ice Used (KG)
          <input id="jobDryIceUsed" type="number" min="0" step="0.1" value="0" />
        </label>

        <label>
          Air Compressor Fuel Top up [YES/NO]
          <select id="jobAirCompressorFuelTopUp">
            <option value="NO">NO</option>
            <option value="YES">YES</option>
          </select>
        </label>

        <label>
          Air Compressor Fuel Top up [Volumn/L]
          <input id="jobAirCompressorFuelTopUpVolume" type="number" min="0" step="0.1" value="0" />
        </label>

        <label>
          Generator Fuel Top up [YES/NO]
          <select id="jobGeneratorFuelTopUp">
            <option value="NO">NO</option>
            <option value="YES">YES</option>
          </select>
        </label>

        <label>
          Generator Fuel Top up [Volumn/L]
          <input id="jobGeneratorFuelTopUpVolume" type="number" min="0" step="0.1" value="0" />
        </label>

        <label>
          Pre-Service Photo Ref
          <input id="jobPreServicePhotoRef" />
        </label>

        <label>
          Post-Service Photo Ref
          <input id="jobPostServicePhotoRef" />
        </label>

        <label>
          Post-Service Video Ref
          <input id="jobPostServiceVideoRef" />
        </label>

        <label>
          Job Status
          <select id="jobStatus" required>
            <option value="New">New</option>
            <option value="Confirmed">Confirmed</option>
            <option value="In-Progress">In-Progress</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Postponed">Postponed</option>
          </select>
        </label>

        <label>
          Receipt Issued
          <select id="jobReceiptIssued">
            <option value="NO">NO</option>
            <option value="YES">YES</option>
          </select>
        </label>

        <label class="full-width">
          Technician Remarks
          <textarea id="jobTechnicianRemarks" rows="3"></textarea>
        </label>

        <button type="submit" class="full-width">Save Job Sheet</button>
      </form>
      <div id="jobMessage" class="result" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
