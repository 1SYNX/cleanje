<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cleanje Booking</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="container">
<h2>Cleanje Booking</h2>

<div class="card">

<input id="name" placeholder="Customer Name">
<input id="plate" placeholder="Vehicle Plate">

<select id="customerType">
<option>Residential</option>
<option>Commercial</option>
<option>Industrial</option>
</select>

<select id="package">
<option value="CVX1">CVX1 - RM150</option>
<option value="CVX2">CVX2 - RM170</option>
<option value="CVX4">CVX4 - RM190</option>
<option value="CVX6">CVX6 - RM210</option>
</select>

<input type="date" id="date">

<select id="timeSlot">
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>

<select id="crew">
<option>Thina</option>
<option>Thina & Thanish</option>
<option>Thina, Thanish & Vishnu</option>
<option>Thina & Vishnu</option>
<option>Thanish & Vishnu</option>
</select>

<select id="source">
<option>WhatsApp</option>
<option>Instagram</option>
<option>Facebook</option>
<option>Referral</option>
<option>Walk-in</option>
<option>Website</option>
<option>Phone Call</option>
<option>Other</option>
</select>

<select id="status">
<option>New</option>
<option>Confirmed</option>
<option>In-Progress</option>
<option>Completed</option>
<option>Cancelled</option>
<option>Postponed</option>
</select>

<textarea id="address" placeholder="Service Address"></textarea>

<button onclick="submitBooking()">Submit Booking</button>

<p><b>Booking ID:</b> <span id="bookingId">-</span></p>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
