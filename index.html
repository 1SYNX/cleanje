<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleanje | Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="page">
    <header class="app-header card">
      <div>
        <p class="badge">Cleanje Booking System</p>
        <h1>New Booking</h1>
      </div>
      <nav class="nav-links" aria-label="Main navigation">
        <a class="active" href="index.html">Booking</a>
        <a href="job.html">Job</a>
        <a href="payment.html">Payment</a>
      </nav>
    </header>

    <section class="card">
      <form id="bookingForm" class="form-grid">
        <label>
          Customer Name
          <input id="name" required placeholder="Enter customer name" />
        </label>

        <label>
          Vehicle Plate / Ref.
          <input id="plate" placeholder="Optional reference" />
        </label>

        <label>
          Customer Type
          <select id="customerType" required>
            <option value="Residential">Residential</option>
            <option value="Commercial">Commercial</option>
            <option value="Industrial">Industrial</option>
          </select>
        </label>

        <label>
          Package
          <select id="package" required>
            <option value="CVX1">CVX1 - RM150</option>
            <option value="CVX2">CVX2 - RM170</option>
            <option value="CVX4">CVX4 - RM190</option>
            <option value="CVX6">CVX6 - RM210</option>
          </select>
        </label>

        <label>
          Booking Date
          <input type="date" id="date" required />
        </label>

        <label>
          Time Slot
          <select id="timeSlot" required>
            <option value="Morning">Morning</option>
            <option value="Afternoon">Afternoon</option>
            <option value="Evening">Evening</option>
          </select>
        </label>

        <label>
          Technician
          <select id="crew" required>
            <option value="Thina">Thina</option>
            <option value="Thina & Thanish">Thina & Thanish</option>
            <option value="Thina, Thanish & Vishnu">Thina, Thanish & Vishnu</option>
            <option value="Thina & Vishnu">Thina & Vishnu</option>
            <option value="Thanish & Vishnu">Thanish & Vishnu</option>
          </select>
        </label>

        <label>
          Booking Source
          <select id="source" required>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Instagram">Instagram</option>
            <option value="Facebook">Facebook</option>
            <option value="Referral">Referral</option>
            <option value="Walk-in">Walk-in</option>
            <option value="Website">Website</option>
            <option value="Phone Call">Phone Call</option>
            <option value="Other">Other</option>
          </select>
        </label>

        <label>
          Booking Status
          <select id="status" required>
            <option value="New">New</option>
            <option value="Confirmed">Confirmed</option>
            <option value="In-Progress">In-Progress</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Postponed">Postponed</option>
          </select>
        </label>

        <label class="full-width">
          Service Address
          <textarea id="address" rows="3" required placeholder="Enter full service address"></textarea>
        </label>

        <button type="submit" class="full-width">Submit Booking</button>
      </form>

      <div id="message" class="result" role="status" aria-live="polite"></div>
      <p class="booking-output"><strong>Latest Booking ID:</strong> <span id="bookingId">-</span></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
